<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Markdown Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  /* Enforced Dark Mode Palette */
  --bg: #111113;
  --surface: #18181b;
  --border: #27272a;
  --text: #fafafa;
  --sub: #a1a1aa;
  --muted: #52525b;
  --hover: #27272a;
  --accent: #f4f4f5;
  --chip-bg: #27272a;
  
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); font-family: var(--sans);
  -webkit-font-smoothing: antialiased; color: var(--text);
}

.app {
  display: flex; flex-direction: column;
  height: 100dvh; width: 100vw;
  background: var(--bg);
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

/* ── Top Bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; color: var(--text); }

.topbar-actions { display: flex; gap: 8px; }
.top-btn {
  height: 28px; padding: 0 12px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text);
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: all 0.15s ease;
}
.top-btn:hover { background: var(--hover); border-color: var(--muted); }
.top-btn:active { transform: scale(0.96); }
.top-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Mobile Segment Control ── */
.segment-wrap {
  display: none; /* Hidden on desktop */
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.segment {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 2px;
  display: flex; position: relative;
}
.seg-track {
  position: absolute; top: 2px; bottom: 2px; left: 2px;
  width: calc(50% - 2px);
  background: var(--hover); border-radius: 6px;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.seg-track.right { transform: translateX(100%); }
.seg-btn {
  flex: 1; padding: 6px 0; border: none; background: transparent;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  color: var(--sub); cursor: pointer; position: relative; z-index: 1;
  transition: color 0.2s;
}
.seg-btn.active { color: var(--text); }

/* ── Workspace & Splitter ── */
.workspace {
  flex: 1; min-height: 0;
  display: flex; flex-direction: row;
  position: relative;
}

.editor-pane {
  flex: 1; /* Splits 50/50 initially */
  min-height: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
}

.resizer {
  position: relative;
  width: 4px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  z-index: 10;
  transition: background 0.2s;
}
/* Invisible wider hit area for easier grabbing */
.resizer::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; left: -4px; right: -4px;
}
.resizer:hover, .resizer.dragging { background: var(--muted); }

.preview-pane {
  flex: 1; min-height: 0;
  background: var(--surface);
  overflow-y: auto; padding: 20px 24px 40px;
}

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; gap: 2px;
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
  flex-shrink: 0;
}
.toolbar::-webkit-scrollbar { display: none; }

.tb-btn {
  width: 32px; height: 30px; border: none; border-radius: 6px;
  background: transparent; color: var(--sub);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; font-family: var(--mono);
  font-size: 13px; font-weight: 600;
  transition: background 0.15s, color 0.15s;
}
.tb-btn:hover { background: var(--hover); color: var(--text); }
.tb-btn:active { transform: scale(0.92); }
.tb-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.tb-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

textarea#editor {
  flex: 1; min-height: 0;
  width: 100%; border: none; outline: none; resize: none;
  background: var(--bg);
  font-family: var(--mono); font-size: 14px; line-height: 1.7;
  color: var(--text); padding: 20px;
  caret-color: var(--accent);
  tab-size: 2;
}
textarea#editor::selection { background: rgba(244,244,245,0.15); }

/* ── Markdown Rendered Styles ── */
.preview-pane h1, .preview-pane h2, .preview-pane h3, .preview-pane h4 { color: var(--text); font-weight: 600; margin-top: 1.5em; margin-bottom: 0.5em; }
.preview-pane h1 { font-size: 24px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-top: 0; }
.preview-pane h2 { font-size: 20px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.preview-pane h3 { font-size: 16px; }
.preview-pane p { font-size: 15px; line-height: 1.7; margin: 0 0 1em; color: var(--sub); }
.preview-pane a { color: var(--text); text-decoration: underline; text-decoration-color: var(--muted); text-underline-offset: 3px; }
.preview-pane a:hover { text-decoration-color: var(--text); }
.preview-pane strong { font-weight: 600; color: var(--text); }
.preview-pane em { font-style: italic; }
.preview-pane ul, .preview-pane ol { margin: 0 0 1em 20px; color: var(--sub); }
.preview-pane li { font-size: 15px; line-height: 1.7; margin-bottom: 4px; }
.preview-pane blockquote {
  margin: 0 0 1em; padding: 10px 16px;
  border-left: 3px solid var(--muted);
  background: var(--bg); border-radius: 0 6px 6px 0;
}
.preview-pane blockquote p { margin: 0; color: var(--sub); font-style: italic; }
.preview-pane code {
  font-family: var(--mono); font-size: 13px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 2px 6px; border-radius: 4px;
}
.preview-pane pre {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin: 0 0 1em; overflow-x: auto;
}
.preview-pane pre code { background: transparent; border: none; padding: 0; color: var(--sub); font-size: 13px; }
.preview-pane table { width: 100%; border-collapse: collapse; margin: 0 0 1em; font-size: 14px; }
.preview-pane th { background: var(--bg); color: var(--text); font-weight: 600; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.preview-pane td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--sub); }
.preview-pane hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.preview-pane img { max-width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid var(--border); }
.preview-pane input[type="checkbox"] { margin-right: 8px; accent-color: var(--accent); }

/* ── Empty preview hint ── */
.preview-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; opacity: 0.5;
}
.preview-empty svg { width: 40px; height: 40px; stroke: var(--muted); }
.preview-empty p { font-size: 14px; font-weight: 500; color: var(--muted); }

/* ── Status bar ── */
.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px calc(6px + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.status-chip { font-size: 11.5px; font-weight: 500; color: var(--sub); font-family: var(--mono); }
.status-right { display: flex; gap: 16px; }

/* ── Responsive Design (Mobile) ── */
@media (max-width: 768px) {
  .segment-wrap { display: block; }
  .workspace { flex-direction: column; }
  .resizer { display: none; } /* Hide splitter on mobile */
  .editor-pane { width: 100% !important; flex: 1 !important; }
  
  /* Tab toggling logic for mobile */
  .workspace.tab-edit .preview-pane { display: none; }
  .workspace.tab-prev .editor-pane { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Top Bar -->
  <div class="topbar">
    <span class="topbar-title">Markdown Editor</span>
    <div class="topbar-actions">
      <button class="top-btn" onclick="downloadMD()" title="Download Markdown">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        .md
      </button>
      <button class="top-btn" onclick="downloadHTML()" title="Download HTML">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        .html
      </button>
    </div>
  </div>

  <!-- Mobile Segment (Hidden on Desktop) -->
  <div class="segment-wrap">
    <div class="segment">
      <div class="seg-track" id="segTrack"></div>
      <button class="seg-btn active" id="segEdit" onclick="setTab('edit')">Editor</button>
      <button class="seg-btn" id="segPrev" onclick="setTab('prev')">Preview</button>
    </div>
  </div>

  <!-- Workspace -->
  <div class="workspace tab-edit" id="workspace">
    
    <!-- Editor Pane -->
    <div class="editor-pane" id="editPane">
      <div class="toolbar" id="toolbar">
        <button class="tb-btn" onclick="ins('# ','',true)" title="H1"><b>H1</b></button>
        <button class="tb-btn" onclick="ins('## ','',true)" title="H2"><b>H2</b></button>
        <button class="tb-btn" onclick="ins('### ','',true)" title="H3"><b>H3</b></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="wrap('**','**')" title="Bold">
          <svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 010 8H6z"/><path d="M6 12h9a4 4 0 010 8H6z"/></svg>
        </button>
        <button class="tb-btn" onclick="wrap('*','*')" title="Italic">
          <svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
        </button>
        <button class="tb-btn" onclick="wrap('~~','~~')" title="Strikethrough">
          <svg viewBox="0 0 24 24"><path d="M17.3 12.7c.4.5.7 1.1.7 1.8A4 4 0 0114 18.4H8"/><path d="M6.7 11.3A3.5 3.5 0 016 9.1 4 4 0 0110 5.2h5"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="ins('- ','',true)" title="List">
          <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="tb-btn" onclick="ins('1. ','',true)" title="Ordered List">
          <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4" stroke-linecap="round"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
        </button>
        <button class="tb-btn" onclick="ins('- [ ] ','',true)" title="Task">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="14" height="14" rx="2"/><path d="M7 12l3 3 6-6"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="wrap('`','`')" title="Inline Code">
          <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <button class="tb-btn" onclick="ins('```\n','\n```',false,true)" title="Code Block">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="3"/><polyline points="8 10 5 13 8 16"/><polyline points="16 10 19 13 16 16"/><line x1="12" y1="8" x2="12" y2="18"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="ins('> ','',true)" title="Quote">
          <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
        </button>
        <button class="tb-btn" onclick="ins('[text](url)','',false)" title="Link">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="tb-btn" onclick="ins('---\n','',true)" title="Divider">
          <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/></svg>
        </button>
        <button class="tb-btn" onclick="ins('| Col 1 | Col 2 |\n|-------|-------|\n| Cell  | Cell  |\n','',true)" title="Table">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        </button>
      </div>
      <textarea id="editor" placeholder="Start writing markdown here…" oninput="onEdit()" spellcheck="false"></textarea>
    </div>

    <!-- Resizer -->
    <div class="resizer" id="resizer"></div>

    <!-- Preview Pane -->
    <div class="preview-pane" id="previewPane">
      <div class="preview-empty" id="previewEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        <p>Nothing to preview yet</p>
      </div>
      <div id="previewContent"></div>
    </div>
    
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span class="status-chip" id="statWords">0 words</span>
    <div class="status-right">
      <span class="status-chip" id="statLines">0 lines</span>
      <span class="status-chip" id="statChars">0 chars</span>
    </div>
  </div>

</div>

<script>
// ── Marked config ──
marked.setOptions({
  breaks: true,
  gfm: true,
});

// ── State (Using an Array to prevent Template Literal Syntax Errors) ──
const DEFAULT = [
  "# Welcome to Markdown Editor",
  "",
  "Start writing your document here. The editor supports **bold**, *italic*, and `inline code`.",
  "",
  "## Desktop & Mobile Ready",
  "On large screens, enjoy a seamless **side-by-side** live preview. Drag the line in the center to resize the panes. On smaller screens, toggle intuitively between Edit and Preview modes.",
  "",
  "## Code Example",
  "",
  "```javascript",
  "function greet(name) {",
  "  return `Hello, ${name}!`;",
  "}",
  "```",
  "",
  "## Table Example",
  "",
  "| Feature | Status |",
  "|---------|--------|",
  "| Editor  | ✅ Done |",
  "| Resizer | ✅ Done |",
  "| Export  | ✅ Done |",
  "",
  "> Write freely. Format beautifully."
].join("\n");

// Init
document.getElementById('editor').value = DEFAULT;
onEdit(); // Run initial render and stats

// ── Drag to Resize Logic ──
const resizer = document.getElementById('resizer');
const editPane = document.getElementById('editPane');
const workspace = document.getElementById('workspace');
let isDragging = false;

resizer.addEventListener('mousedown', function(e) {
  isDragging = true;
  resizer.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none'; // Prevent text selection while dragging
});

document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  // Calculate new width relative to workspace
  const workspaceRect = workspace.getBoundingClientRect();
  let newWidth = e.clientX - workspaceRect.left;
  
  // Enforce min and max widths
  const minWidth = 200;
  const maxWidth = workspaceRect.width - 200;
  newWidth = Math.max(minWidth, Math.min(newWidth, maxWidth));
  
  // Apply new width, let flex handle the rest
  editPane.style.flex = 'none';
  editPane.style.width = newWidth + 'px';
});

document.addEventListener('mouseup', function() {
  if (isDragging) {
    isDragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ── Mobile Tab switching ──
function setTab(tab) {
  const isEdit = tab === 'edit';
  const ws = document.getElementById('workspace');

  document.getElementById('segTrack').classList.toggle('right', !isEdit);
  document.getElementById('segEdit').classList.toggle('active', isEdit);
  document.getElementById('segPrev').classList.toggle('active', !isEdit);

  ws.className = `workspace tab-${tab}`;
}

// ── Editor events ──
function onEdit() {
  updateStats();
  renderPreview(); // Live render for desktop split view
}

function renderPreview() {
  const src = document.getElementById('editor').value.trim();
  const empty = document.getElementById('previewEmpty');
  const content = document.getElementById('previewContent');

  if (!src) {
    empty.style.display = 'flex';
    content.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  content.innerHTML = marked.parse(src);
}

function updateStats() {
  const val = document.getElementById('editor').value;
  const words = val.trim() ? val.trim().split(/\s+/).length : 0;
  const lines = val ? val.split('\n').length : 0;
  document.getElementById('statWords').textContent = words + ' words';
  document.getElementById('statLines').textContent = lines + ' lines';
  document.getElementById('statChars').textContent = val.length + ' chars';
}

// ── Toolbar helpers ──
function ins(before, after = '', newLine = false, block = false) {
  const ta = document.getElementById('editor');
  const s = ta.selectionStart;
  const e = ta.selectionEnd;
  const v = ta.value;

  let insert = before + (block ? '\n' : '') + (v.slice(s, e)) + after;
  if (newLine && s > 0 && v[s-1] !== '\n') insert = '\n' + insert;

  ta.value = v.slice(0, s) + insert + v.slice(e);
  const pos = s + before.length + (newLine && s > 0 ? 1 : 0);
  ta.setSelectionRange(pos, pos + (e - s));
  ta.focus();
  onEdit();
}

function wrap(open, close) {
  const ta = document.getElementById('editor');
  const s = ta.selectionStart;
  const e = ta.selectionEnd;
  const v = ta.value;
  const selected = v.slice(s, e) || 'text';

  ta.value = v.slice(0, s) + open + selected + close + v.slice(e);
  ta.setSelectionRange(s + open.length, s + open.length + selected.length);
  ta.focus();
  onEdit();
}

// ── Downloads ──
function downloadMD() {
  const content = document.getElementById('editor').value;
  download(content, 'document.md', 'text/markdown');
}

function downloadHTML() {
  const content = document.getElementById('editor').value;
  const body = marked.parse(content);
  
  // Built securely using an array to prevent any parsing/syntax errors
  const htmlParts = [
    '<!DOCTYPE html>',
    '<html lang="en">',
    '<head>',
    '<meta charset="UTF-8">',
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
    '<title>Document</title>',
    '<style>',
    '  body { background: #111113; color: #a1a1aa; max-width: 800px; margin: 40px auto; padding: 0 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.7; }',
    '  h1,h2,h3,h4 { color: #fafafa; font-weight: 600; margin-top: 1.5em; letter-spacing: -0.3px; }',
    '  h1 { font-size: 28px; border-bottom: 1px solid #27272a; padding-bottom: 12px; margin-top: 0; }',
    '  h2 { font-size: 22px; border-bottom: 1px solid #27272a; padding-bottom: 8px; }',
    '  a { color: #fafafa; text-decoration: underline; text-decoration-color: #52525b; text-underline-offset: 3px; }',
    '  strong { color: #fafafa; font-weight: 600; }',
    '  code { background: #18181b; border: 1px solid #27272a; padding: 2px 6px; border-radius: 4px; font-size: 14px; color: #fafafa; font-family: monospace; }',
    '  pre { background: #18181b; border: 1px solid #27272a; padding: 16px; border-radius: 8px; overflow-x: auto; }',
    '  pre code { background: none; border: none; padding: 0; color: #a1a1aa; }',
    '  blockquote { border-left: 3px solid #52525b; margin: 0 0 1em; padding: 10px 16px; background: #18181b; border-radius: 0 6px 6px 0; font-style: italic; }',
    '  table { width: 100%; border-collapse: collapse; margin-bottom: 1em; }',
    '  th, td { padding: 12px 14px; border-bottom: 1px solid #27272a; text-align: left; }',
    '  th { background: #18181b; color: #fafafa; font-weight: 600; }',
    '  img { max-width: 100%; border-radius: 8px; border: 1px solid #27272a; }',
    '</style>',
    '</head>',
    '<body>' + body + '</body>',
    '</html>'
  ];
  
  download(htmlParts.join('\n'), 'document.html', 'text/html');
}

function download(content, filename, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
